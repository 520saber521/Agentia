<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frontend + Backend Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,sans-serif}
body{min-height:100vh;display:flex;justify-content:center;align-items:center;background:linear-gradient(135deg,#667eea,#764ba2);padding:1rem}
.card{background:#fff;border-radius:20px;padding:2.5rem 2rem;width:100%;max-width:420px;box-shadow:0 20px 60px rgba(0,0,0,.15);text-align:center;transition:transform .2s}
.card:hover{transform:translateY(-4px)}
h1{font-size:1.8rem;color:#222;margin-bottom:.5rem}
.sub{color:#666;margin-bottom:1.8rem;font-size:.95rem}
.input-group{display:flex;gap:.5rem;margin-bottom:1.5rem}
input{flex:1;padding:.75rem 1rem;border:2px solid #e0e0e0;border-radius:12px;font-size:1rem;outline:none;transition:border .2s}
input:focus{border-color:#667eea}
button{padding:.75rem 1.5rem;border:none;background:#667eea;color:#fff;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;transition:background .2s,transform .1s}
button:hover{background:#5a6fd6}
button:active{transform:scale(.97)}
button:disabled{opacity:.6;cursor:not-allowed}
#response{margin-top:1.5rem;padding:1rem;background:#f4f7fc;border-radius:12px;min-height:60px;display:flex;flex-direction:column;justify-content:center;align-items:center;transition:all .3s}
.response-text{font-size:1.1rem;color:#333;line-height:1.4}
.loader{width:28px;height:28px;border:3px solid #e0e0e0;border-top-color:#667eea;border-radius:50%;animation:spin .6s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.hidden{display:none}
.mock-card{margin-top:1.5rem;padding:1rem;background:#fafafa;border-radius:12px;font-size:.85rem;color:#888;text-align:left}
.mock-card span{display:block;margin-top:.3rem;color:#666;font-weight:500}
</style>
</head>
<body>
<div class="card">
  <h1>🌐 前后端交互</h1>
  <p class="sub">输入名字，模拟请求后端 API</p>
  <div class="input-group">
    <input type="text" id="nameInput" placeholder="例如 Alice" value="Alice">
    <button id="fetchBtn" onclick="fetchGreeting()">发送</button>
  </div>
  <div id="response">
    <div class="response-text">👋 等待你的输入...</div>
  </div>
  <div class="mock-card">
    🌟 前端发起请求 → 模拟后端返回
    <span id="mockStatus">GET /api/greet?name=Alice</span>
  </div>
</div>

<script>
let isLoading = false;

function fetchGreeting() {
  if (isLoading) return;
  const input = document.getElementById('nameInput');
  const name = input.value.trim() || 'World';
  const responseDiv = document.getElementById('response');
  const mockStatus = document.getElementById('mockStatus');
  
  // 显示加载状态
  isLoading = true;
  document.getElementById('fetchBtn').disabled = true;
  responseDiv.innerHTML = '<div class="loader"></div>';
  mockStatus.textContent = `⏳ 正在请求 GET /api/greet?name=${encodeURIComponent(name)}`;
  
  // 模拟后端延迟 1.2 秒
  setTimeout(() => {
    // 模拟返回数据
    const mockResponse = {
      message: `你好，${name}！欢迎来到前后端示例。`,
      timestamp: new Date().toLocaleTimeString()
    };
    
    responseDiv.innerHTML = `
      <div class="response-text">${mockResponse.message}</div>
      <div style="font-size:.8rem;color:#999;margin-top:.3rem">⏰ ${mockResponse.timestamp}</div>
    `;
    mockStatus.textContent = `✅ 200 OK  /api/greet?name=${encodeURIComponent(name)}`;
    isLoading = false;
    document.getElementById('fetchBtn').disabled = false;
  }, 1200);
}

// 支持回车键发送
window.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && document.activeElement === document.getElementById('nameInput')) {
    fetchGreeting();
  }
});

// 页面加载后自动触发一次
window.addEventListener('load', () => fetchGreeting());
</script>
</body>
</html>
